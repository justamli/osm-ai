<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Intelligence</title>
    <!-- Modern Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="glass-container">
        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="brand">
            <div class="logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <h1>Nexus</h1>
          </div>
          
          <nav class="sidebar-nav">
            <a href="#" class="nav-item active">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              Chat
            </a>
            <a href="#" id="settings-btn" class="nav-item">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
              Settings
            </a>
          </nav>
          
          <div class="sidebar-footer">
            <button id="new-session" class="btn-primary">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              New Session
            </button>
          </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
          <header class="chat-header">
            <div class="header-status">
              <h2>Assistant</h2>
              <span class="status-indicator"></span>
              <span class="status-text">Connected</span>
            </div>
          </header>

          <div class="messages-container" id="chat-messages">
            <div class="welcome-message">
              <h2>How can I help you today?</h2>
              <p>Experience the 3-Layer Intelligent Backend Engine.</p>
              <div class="suggestion-chips">
                <button class="chip">Tell me a joke</button>
                <button class="chip">What is the weather?</button>
                <button class="chip">Suggest a restaurant</button>
              </div>
            </div>
          </div>

          <div class="input-container">
            <form id="chat-form">
              <div class="input-wrapper">
                <textarea id="message-input" placeholder="Message Nexus AI..." rows="1"></textarea>
                <button type="submit" id="send-btn" title="Send message">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                </button>
              </div>
            </form>
            <div class="footer-text">Nexus Intelligence utilizes an advanced routing layer. Responses may vary.</div>
          </div>
        </main>
      </div>

      <!-- Settings / Prompt Editor Modal -->
      <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content glass-container">
          <div class="modal-header">
            <h2>Prompt Editor</h2>
            <button id="close-modal-btn" class="icon-btn">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="editor-sidebar">
              <div class="sidebar-top">
                <h3>Intents</h3>
                <button id="add-intent-btn" class="icon-btn-small" title="Add New Intent">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
              </div>
              <ul id="intent-list" class="intent-list">
                <!-- Dynamically populated -->
              </ul>
            </div>
            <div class="editor-main">
              <div class="editor-toolbar">
                <h3 id="current-edit-title">Editing: -</h3>
                <div class="toolbar-actions">
                  <button id="restore-master-btn" class="btn-secondary hidden" title="Restore Default Master Prompt">Restore Default</button>
                  <button id="delete-intent-btn" class="btn-danger hidden" title="Delete Intent">Delete</button>
                  <button id="save-prompt-btn" class="btn-primary-small" disabled>Save Changes</button>
                </div>
              </div>
              <textarea id="prompt-editor" placeholder="Select an intent to edit..."></textarea>
              <div id="save-status" class="save-status"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
